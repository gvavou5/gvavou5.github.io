<section id="contact">
  <div class="section-header">
    <h2>Contact</h2>
  </div>

  <div class="contact-grid">
    <button class="contact-card" onclick="copyEmail('{{ site.author.email_personal }}', this)">
      <div class="contact-icon"><i class="fa-solid fa-envelope"></i></div>
      <div>
        <div class="contact-label">Personal Email</div>
        <div class="contact-value">{{ site.author.email_personal }}</div>
      </div>
      <span class="copy-tooltip">Copied!</span>
    </button>

    <button class="contact-card" onclick="copyEmail('{{ site.author.email_work }}', this)">
      <div class="contact-icon"><i class="fa-solid fa-building"></i></div>
      <div>
        <div class="contact-label">Work Email</div>
        <div class="contact-value">{{ site.author.email_work }}</div>
      </div>
      <span class="copy-tooltip">Copied!</span>
    </button>

    <a class="contact-card" href="{{ site.social.linkedin }}" target="_blank">
      <div class="contact-icon"><i class="fa-brands fa-linkedin-in"></i></div>
      <div>
        <div class="contact-label">LinkedIn</div>
        <div class="contact-value">georgiosvavouliotis</div>
      </div>
    </a>

    <a class="contact-card" href="{{ site.social.scholar }}" target="_blank">
      <div class="contact-icon"><i class="fa-brands fa-google-scholar"></i></div>
      <div>
        <div class="contact-label">Google Scholar</div>
        <div class="contact-value">{{ site.author.name }}</div>
      </div>
    </a>

    <a class="contact-card" href="{{ site.author.office_map }}" target="_blank">
      <div class="contact-icon"><i class="fa-solid fa-location-dot"></i></div>
      <div>
        <div class="contact-label">Office</div>
        <div class="contact-value">{{ site.author.office }}</div>
      </div>
    </a>

    <a class="contact-card" href="{{ site.social.github }}" target="_blank">
      <div class="contact-icon"><i class="fa-brands fa-github"></i></div>
      <div>
        <div class="contact-label">GitHub</div>
        <div class="contact-value">@gvavou5</div>
      </div>
    </a>
  </div>

</section>
