<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="description" content="{{ site.description }}"/>
  <meta name="author" content="{{ site.author.name }}"/>
  <title>{{ site.author.name }}</title>
  <link rel="icon" href="/assets/favicon_io/favicon.ico">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300;1,9..40,400&display=swap" rel="stylesheet">

  <!-- Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <!-- Site stylesheet -->
  <link rel="stylesheet" href="/assets/css/main.css?v={{ site.time | date: '%s' }}">
</head>
<body>

  {% include nav.html %}

  <main>
    {{ content }}
  </main>

  {% include footer.html %}

  <!-- Back to top button -->
  <button class="back-to-top" id="backToTop" onclick="scrollToTop()" aria-label="Back to top">
    <i class="fa-solid fa-chevron-up"></i>
  </button>

  <script src="/assets/js/main.js?v={{ site.time | date: '%s' }}"></script>
</body>
</html>
